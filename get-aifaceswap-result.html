<!DOCTYPE html>
<html>
<head>
    <title>Get AIFaceSwap Result</title>
</head>
<body>
    <h1>Get AIFaceSwap.io Result</h1>
    <p>Task ID: <strong>b664b4df421f8a708a4d38ec437db058</strong></p>
    
    <button onclick="getResultDirectly()">Get Result from AIFaceSwap.io</button>
    <button onclick="updateOurDatabase()">Update Our Database</button>
    
    <div id="result" style="margin-top: 20px; font-family: monospace; white-space: pre; background: #f5f5f5; padding: 15px; border-radius: 5px;"></div>
    <div id="imageContainer" style="margin-top: 20px;"></div>

    <script>
        const taskId = 'b664b4df421f8a708a4d38ec437db058';
        const apiKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIyMjQ3ODY1IiwibmFtZSI6ImFpZmFjZXN3YXAiLCJpYXQiOjE3NTU2OTA1MjZ9.KSCNtPcgz5_jfTcd0YXIOayLlLQfkYBvmobExdykft8';
        
        function log(message) {
            document.getElementById('result').textContent += new Date().toLocaleTimeString() + ': ' + message + '\n';
        }
        
        async function getResultDirectly() {
            log('🔍 Trying to get result directly from AIFaceSwap.io...');
            
            // Try different possible endpoints
            const endpoints = [
                'https://aifaceswap.io/api/aifaceswap/v1/result',
                'https://aifaceswap.io/api/aifaceswap/v1/query',
                'https://aifaceswap.io/api/aifaceswap/v1/status',
                'https://aifaceswap.io/api/aifaceswap/v1/get_result'
            ];
            
            for (const endpoint of endpoints) {
                try {
                    log(`Trying endpoint: ${endpoint}`);
                    
                    const response = await fetch(endpoint, {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${apiKey}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            task_id: taskId
                        })
                    });
                    
                    const text = await response.text();
                    log(`Response (${response.status}): ${text.substring(0, 200)}...`);
                    
                    if (response.ok) {
                        try {
                            const data = JSON.parse(text);
                            if (data.data && data.data.result_image) {
                                log('✅ Found result image!');
                                showImage(data.data.result_image);
                                return data.data.result_image;
                            }
                        } catch (e) {
                            // Not JSON, continue
                        }
                    }
                } catch (error) {
                    log(`❌ ${endpoint} failed: ${error.message}`);
                }
            }
            
            log('❌ Could not find result through API endpoints');
            log('💡 Please check AIFaceSwap.io website directly:');
            log('   1. Go to https://aifaceswap.io');
            log('   2. Login to your account');
            log('   3. Check history/dashboard');
            log('   4. Search for task: ' + taskId);
        }
        
        function showImage(imageUrl) {
            const container = document.getElementById('imageContainer');
            container.innerHTML = `
                <h3>🎉 Result Image Found!</h3>
                <img src="${imageUrl}" style="max-width: 500px; border: 2px solid #4CAF50; border-radius: 8px;">
                <p><a href="${imageUrl}" target="_blank">Open in new tab</a></p>
            `;
        }
        
        async function updateOurDatabase() {
            const imageUrl = prompt('Enter the result image URL from AIFaceSwap.io website:');
            if (!imageUrl) return;
            
            log('🔄 Updating our database with result...');
            
            try {
                const supabaseUrl = 'https://afsmkbuspfmhenrccwru.supabase.co';
                const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFmc21rYnVzcGZtaGVucmNjd3J1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTU2ODcxNzUsImV4cCI6MjA3MTI2MzE3NX0.x2RCn4DBe10CKNC9LZ6CIvwuj__IU5cbxPJd7JJIU-U';
                
                const response = await fetch(`${supabaseUrl}/rest/v1/face_swap_tasks?task_id=eq.${taskId}`, {
                    method: 'PATCH',
                    headers: {
                        'apikey': supabaseKey,
                        'Authorization': `Bearer ${supabaseKey}`,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=representation'
                    },
                    body: JSON.stringify({
                        status: 'completed',
                        result_image: imageUrl,
                        updated_at: new Date().toISOString()
                    })
                });
                
                const result = await response.json();
                log('✅ Database updated successfully!');
                log('🎉 Now refresh your app and the result should appear!');
                showImage(imageUrl);
                
            } catch (error) {
                log('❌ Failed to update database: ' + error.message);
            }
        }
        
        // Auto-start
        window.onload = getResultDirectly;
    </script>
</body>
</html>

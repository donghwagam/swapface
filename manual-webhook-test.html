<!DOCTYPE html>
<html>
<head>
    <title>Manual Webhook Test</title>
</head>
<body>
    <h1>Manual Webhook Test</h1>
    <p>Task ID: <strong>b664b4df421f8a708a4d38ec437db058</strong></p>
    
    <h2>Test Webhook with Success</h2>
    <button onclick="testWebhookSuccess()">Test Success Webhook</button>
    
    <h2>Test Webhook with Failure</h2>
    <button onclick="testWebhookFailure()">Test Failure Webhook</button>
    
    <h2>Check AIFaceSwap.io Logs</h2>
    <button onclick="checkSupabaseLogs()">Check Supabase Function Logs</button>
    
    <div id="result" style="margin-top: 20px; font-family: monospace; white-space: pre; background: #f5f5f5; padding: 15px; border-radius: 5px;"></div>

    <script>
        const taskId = 'b664b4df421f8a708a4d38ec437db058';
        const supabaseUrl = 'https://afsmkbuspfmhenrccwru.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFmc21rYnVzcGZtaGVucmNjd3J1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTU2ODcxNzUsImV4cCI6MjA3MTI2MzE3NX0.x2RCn4DBe10CKNC9LZ6CIvwuj__IU5cbxPJd7JJIU-U';
        
        function log(message) {
            document.getElementById('result').textContent += new Date().toLocaleTimeString() + ': ' + message + '\n';
        }
        
        async function testWebhookSuccess() {
            log('Testing webhook with success result...');
            
            try {
                const response = await fetch(`${supabaseUrl}/functions/v1/aifaceswap-webhook`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${supabaseKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        success: 1,
                        type: 1,
                        task_id: taskId,
                        result_image: 'https://images.pexels.com/photos/1559486/pexels-photo-1559486.jpeg?auto=compress&cs=tinysrgb&w=400'
                    })
                });
                
                const result = await response.json();
                log('✅ Webhook test success response: ' + JSON.stringify(result, null, 2));
                
                // Check if task was updated
                setTimeout(checkTaskAfterWebhook, 2000);
                
            } catch (error) {
                log('❌ Webhook test failed: ' + error.message);
            }
        }
        
        async function testWebhookFailure() {
            log('Testing webhook with failure result...');
            
            try {
                const response = await fetch(`${supabaseUrl}/functions/v1/aifaceswap-webhook`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${supabaseKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        success: 0,
                        type: 1,
                        task_id: taskId,
                        error: 'Manual test failure'
                    })
                });
                
                const result = await response.json();
                log('✅ Webhook failure test response: ' + JSON.stringify(result, null, 2));
                
            } catch (error) {
                log('❌ Webhook failure test failed: ' + error.message);
            }
        }
        
        async function checkTaskAfterWebhook() {
            log('Checking task status after webhook...');
            
            try {
                const response = await fetch(`${supabaseUrl}/rest/v1/face_swap_tasks?task_id=eq.${taskId}&select=*`, {
                    headers: {
                        'apikey': supabaseKey,
                        'Authorization': `Bearer ${supabaseKey}`
                    }
                });
                
                const data = await response.json();
                
                if (data && data.length > 0) {
                    const task = data[0];
                    log('📊 Updated task status: ' + task.status);
                    log('🖼️ Result image: ' + (task.result_image || 'None'));
                    log('📅 Updated at: ' + task.updated_at);
                } else {
                    log('❌ Task not found');
                }
            } catch (error) {
                log('❌ Error checking task: ' + error.message);
            }
        }
        
        function checkSupabaseLogs() {
            log('📋 To check Supabase logs:');
            log('1. Go to: https://supabase.com/dashboard/project/afsmkbuspfmhenrccwru/functions');
            log('2. Click on "aifaceswap-webhook" function');
            log('3. Check "Logs" tab for webhook calls');
            log('4. Look for task_id: ' + taskId);
        }
    </script>
</body>
</html>
